<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>Hazel's World ✨</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;700;900&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #ffd6f0 0%, #c4e1ff 50%, #d4f7d4 100%);
      font-family: 'Nunito', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    /* Floating bubbles background */
    .bubble {
      position: fixed;
      border-radius: 50%;
      opacity: 0.3;
      animation: float linear infinite;
      pointer-events: none;
    }
    @keyframes float {
      0%   { transform: translateY(110vh) rotate(0deg); }
      100% { transform: translateY(-10vh) rotate(360deg); }
    }

    .hero {
      text-align: center;
      z-index: 1;
      padding: 2rem;
    }

    .crown {
      font-size: 5rem;
      animation: bounce 1.5s ease-in-out infinite;
    }
    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50%       { transform: translateY(-18px); }
    }

    h1 {
      font-family: 'Fredoka One', cursive;
      font-size: clamp(2.8rem, 10vw, 5rem);
      background: linear-gradient(90deg, #ff6fb7, #a259ff, #4fc3f7, #43e97b);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin: 0.3rem 0;
      line-height: 1.1;
      filter: drop-shadow(0 2px 8px rgba(0,0,0,0.12));
    }

    .tagline {
      font-size: clamp(1rem, 4vw, 1.4rem);
      color: #7b5ea7;
      font-weight: 700;
      margin-top: 0.5rem;
      letter-spacing: 0.02em;
    }

    .sparkles {
      font-size: 2rem;
      margin-top: 1.2rem;
      animation: spin-slow 4s linear infinite;
      display: inline-block;
    }
    @keyframes spin-slow {
      0%   { transform: rotate(0deg) scale(1); }
      50%  { transform: rotate(180deg) scale(1.2); }
      100% { transform: rotate(360deg) scale(1); }
    }

    .card {
      background: rgba(255,255,255,0.65);
      backdrop-filter: blur(12px);
      border-radius: 2rem;
      padding: 2rem 2.5rem;
      margin-top: 2rem;
      box-shadow: 0 8px 32px rgba(162,89,255,0.15);
      max-width: 420px;
      font-size: 1.1rem;
      color: #4a3060;
      font-weight: 700;
      line-height: 1.6;
    }

    .stars {
      margin-top: 1.5rem;
      font-size: 1.8rem;
      letter-spacing: 0.3rem;
    }
  </style>
</head>
<body>

  <!-- Floating bubbles -->
  <script>
    const colors = ['#ffd6f0','#c4e1ff','#ffe4a0','#d4f7d4','#ffc9f0','#b8f0ff'];
    for (let i = 0; i < 18; i++) {
      const b = document.createElement('div');
      b.className = 'bubble';
      const size = 30 + Math.random() * 80;
      b.style.cssText = `
        width:${size}px; height:${size}px;
        left:${Math.random()*100}%;
        background:${colors[Math.floor(Math.random()*colors.length)]};
        animation-duration:${6 + Math.random()*10}s;
        animation-delay:${Math.random()*8}s;
      `;
      document.body.appendChild(b);
    }
  </script>

  <div class="hero">
    <div class="crown">👑</div>
    <h1>Hazel's World</h1>
    <p class="tagline">This page belongs to Hazel ✨</p>
    <div class="sparkles">🌸</div>

    <div class="card">
      Something magical is being built here.<br>
      Stay tuned! 🦋🌈⭐
      <div class="stars">⭐🌟💫</div>
    </div>
  </div>

</body>
</html>
