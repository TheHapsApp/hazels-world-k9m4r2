<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>Hazel's Fun Games! 🌟</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;700;900&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #ffe4f0 0%, #e4d4ff 50%, #d4f0ff 100%);
      font-family: 'Nunito', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem 1rem 3rem;
    }

    /* ── HOME ── */
    #home { display: flex; flex-direction: column; align-items: center; width: 100%; }

    .site-title {
      font-family: 'Fredoka One', cursive;
      font-size: clamp(2rem, 9vw, 3.8rem);
      background: linear-gradient(90deg, #ff6fb7, #a259ff, #4fc3f7);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      text-align: center;
      line-height: 1.2;
      margin-bottom: 0.3rem;
    }

    .site-sub {
      font-size: 1.1rem;
      font-weight: 700;
      color: #7b5ea7;
      text-align: center;
      margin-bottom: 2.2rem;
    }

    .game-choices {
      display: flex;
      flex-wrap: wrap;
      gap: 1.2rem;
      justify-content: center;
      max-width: 520px;
      width: 100%;
    }

    .game-btn {
      flex: 1 1 200px;
      background: white;
      border: 3px solid transparent;
      border-radius: 2rem;
      padding: 2rem 1.2rem;
      text-align: center;
      cursor: pointer;
      box-shadow: 0 6px 20px rgba(162,89,255,0.15);
      transition: transform 0.15s, box-shadow 0.15s, border-color 0.15s;
    }

    .game-btn:hover {
      transform: translateY(-6px) scale(1.04);
      box-shadow: 0 12px 32px rgba(162,89,255,0.25);
      border-color: #a259ff;
    }

    .game-btn .big { font-size: 4rem; display: block; margin-bottom: 0.5rem; }

    .game-btn .label {
      font-family: 'Fredoka One', cursive;
      font-size: 1.3rem;
      color: #4a3060;
    }

    /* ── GAME SCREEN ── */
    .game-screen { display: none; flex-direction: column; align-items: center; width: 100%; }
    .game-screen.show { display: flex; }

    .back-btn {
      align-self: flex-start;
      background: rgba(255,255,255,0.7);
      border: none;
      border-radius: 2rem;
      padding: 0.5rem 1.2rem;
      font-family: 'Nunito', sans-serif;
      font-weight: 900;
      font-size: 1rem;
      color: #7b5ea7;
      cursor: pointer;
      margin-bottom: 1.2rem;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
      transition: transform 0.1s;
    }
    .back-btn:hover { transform: scale(1.05); }

    h1 {
      font-family: 'Fredoka One', cursive;
      font-size: clamp(1.8rem, 7vw, 3rem);
      background: linear-gradient(90deg, #ff6fb7, #a259ff, #4fc3f7);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      text-align: center;
      margin-bottom: 0.4rem;
      line-height: 1.2;
    }

    .subtitle {
      font-size: 1rem;
      color: #7b5ea7;
      font-weight: 700;
      text-align: center;
      margin-bottom: 1.6rem;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
      gap: 1rem;
      max-width: 680px;
      width: 100%;
    }

    .pick-card {
      background: white;
      border-radius: 1.5rem;
      padding: 1.2rem 0.8rem;
      text-align: center;
      cursor: pointer;
      box-shadow: 0 4px 16px rgba(162,89,255,0.12);
      transition: transform 0.15s, box-shadow 0.15s;
      border: 3px solid transparent;
      user-select: none;
    }

    .pick-card:hover {
      transform: translateY(-6px) scale(1.04);
      box-shadow: 0 10px 28px rgba(162,89,255,0.22);
      border-color: #a259ff;
    }

    .pick-card:active { transform: scale(0.96); }

    .pick-emoji { font-size: 3.2rem; display: block; margin-bottom: 0.4rem; line-height: 1; }
    .pick-name  { font-size: 0.95rem; font-weight: 900; color: #4a3060; }

    /* ── RESULT ── */
    .result { display: none; flex-direction: column; align-items: center; text-align: center; }
    .result.show {
      display: flex;
      animation: popIn 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    @keyframes popIn {
      0%   { transform: scale(0.5); opacity: 0; }
      100% { transform: scale(1);   opacity: 1; }
    }

    .big-pick {
      font-size: 8rem;
      margin-bottom: 0.5rem;
      animation: wiggle 0.6s ease-in-out 0.1s;
    }

    @keyframes wiggle {
      0%,100% { transform: rotate(0deg); }
      25%      { transform: rotate(-12deg); }
      75%      { transform: rotate(12deg); }
    }

    .result h2 {
      font-family: 'Fredoka One', cursive;
      font-size: clamp(1.6rem, 6vw, 2.8rem);
      background: linear-gradient(90deg, #ff6fb7, #a259ff, #4fc3f7);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 0.5rem;
    }

    .result-msg {
      font-size: 1.1rem;
      font-weight: 700;
      color: #7b5ea7;
      margin-bottom: 1.8rem;
    }

    .again-btn {
      background: linear-gradient(135deg, #ff6fb7, #a259ff);
      color: white;
      border: none;
      border-radius: 2rem;
      padding: 0.9rem 2.2rem;
      font-family: 'Fredoka One', cursive;
      font-size: 1.3rem;
      cursor: pointer;
      box-shadow: 0 4px 16px rgba(162,89,255,0.3);
      transition: transform 0.15s;
    }
    .again-btn:hover { transform: translateY(-3px) scale(1.04); }

    /* Confetti + celebration pieces */
    .confetti-piece {
      position: fixed;
      pointer-events: none;
      animation: confettiFall linear forwards;
    }
    @keyframes confettiFall {
      0%   { transform: translateY(-20px) rotate(0deg);   opacity: 1; }
      100% { transform: translateY(110vh) rotate(720deg); opacity: 0; }
    }

    .float-piece {
      position: fixed;
      pointer-events: none;
      font-size: 2rem;
      animation: floatUp linear forwards;
      z-index: 9999;
    }
    @keyframes floatUp {
      0%   { transform: translateY(0)     scale(1)   rotate(0deg);   opacity: 1; }
      100% { transform: translateY(-90vh) scale(0.6) rotate(30deg);  opacity: 0; }
    }

    /* Big 2566 number burst */
    .number-burst {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) scale(0);
      font-family: 'Fredoka One', cursive;
      font-size: clamp(4rem, 18vw, 9rem);
      background: linear-gradient(90deg, #ff6fb7, #ffe066, #a259ff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      pointer-events: none;
      z-index: 9998;
      animation: burst 1.2s cubic-bezier(0.34,1.56,0.64,1) forwards;
      filter: drop-shadow(0 4px 16px rgba(255,111,183,0.5));
    }
    @keyframes burst {
      0%   { transform: translate(-50%,-50%) scale(0);   opacity: 0; }
      40%  { transform: translate(-50%,-50%) scale(1.2); opacity: 1; }
      70%  { transform: translate(-50%,-50%) scale(0.95);opacity: 1; }
      100% { transform: translate(-50%,-50%) scale(1);   opacity: 0; }
    }

    /* Music button */
    #music-btn {
      position: fixed;
      bottom: 1.4rem;
      right: 1.4rem;
      width: 62px;
      height: 62px;
      border-radius: 50%;
      border: none;
      background: linear-gradient(135deg, #ff6fb7, #a259ff);
      font-size: 1.7rem;
      cursor: pointer;
      box-shadow: 0 4px 18px rgba(162,89,255,0.35);
      transition: transform 0.15s, box-shadow 0.15s;
      z-index: 999;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    #music-btn:hover { transform: scale(1.1); box-shadow: 0 6px 24px rgba(162,89,255,0.5); }
    #music-btn.playing { animation: pulse 1.2s ease-in-out infinite; }
    @keyframes pulse {
      0%,100% { transform: scale(1);    box-shadow: 0 4px 18px rgba(162,89,255,0.35); }
      50%      { transform: scale(1.12); box-shadow: 0 6px 28px rgba(162,89,255,0.6); }
    }
  </style>
</head>
<body>

  <!-- Music button (always visible) -->
  <button id="music-btn" onclick="toggleMusic()" title="Music">🎵</button>

  <!-- HOME -->
  <div id="home">
    <h1 class="site-title">🌟 Hazel's Fun Games!</h1>
    <p class="site-sub">Pick a game to play!</p>
    <div class="game-choices">
      <div class="game-btn" onclick="startGame('animals')">
        <span class="big">🐾</span>
        <div class="label">Pick Your Favorite Animal!</div>
      </div>
      <div class="game-btn" onclick="startGame('foods')">
        <span class="big">🍕</span>
        <div class="label">Pick Your Favorite Food!</div>
      </div>
    </div>
  </div>

  <!-- ANIMAL GAME -->
  <div class="game-screen" id="animals-screen">
    <button class="back-btn" onclick="goHome()">← Back to Games</button>
    <h1>🐾 Pick Your Favorite Animal!</h1>
    <p class="subtitle">Tap the one you love the most!</p>
    <div class="grid" id="animals-grid"></div>
    <div class="result" id="animals-result">
      <div class="big-pick" id="animals-big"></div>
      <h2 id="animals-title"></h2>
      <p class="result-msg" id="animals-msg"></p>
      <button class="again-btn" onclick="resetGame('animals')">🔄 Pick Again!</button>
    </div>
  </div>

  <!-- FOOD GAME -->
  <div class="game-screen" id="foods-screen">
    <button class="back-btn" onclick="goHome()">← Back to Games</button>
    <h1>🍕 Pick Your Favorite Food!</h1>
    <p class="subtitle">Tap the yummiest one!</p>
    <div class="grid" id="foods-grid"></div>
    <div class="result" id="foods-result">
      <div class="big-pick" id="foods-big"></div>
      <h2 id="foods-title"></h2>
      <p class="result-msg" id="foods-msg"></p>
      <button class="again-btn" onclick="resetGame('foods')">🔄 Pick Again!</button>
    </div>
  </div>

  <script>
    const DATA = {
      animals: [
        { emoji: '🐶', name: 'Dog',       msg: 'Dogs are the BEST friends ever! 🦴' },
        { emoji: '🐱', name: 'Cat',       msg: 'Cats are so fluffy and cute! 😺' },
        { emoji: '🐰', name: 'Bunny',     msg: 'Bunnies have the softest ears! 🥕' },
        { emoji: '🐼', name: 'Panda',     msg: 'Pandas are so cuddly and round! 🎋' },
        { emoji: '🦊', name: 'Fox',       msg: 'Foxes are clever and super pretty! 🍂' },
        { emoji: '🐨', name: 'Koala',     msg: 'Koalas sleep in trees — so cozy! 🌿' },
        { emoji: '🦁', name: 'Lion',      msg: 'Lions are brave and mighty! 👑' },
        { emoji: '🐸', name: 'Frog',      msg: 'Frogs love to jump and swim! 💚' },
        { emoji: '🦋', name: 'Butterfly', msg: 'Butterflies are magical and beautiful! 🌸' },
        { emoji: '🐬', name: 'Dolphin',   msg: 'Dolphins are super smart and playful! 🌊' },
        { emoji: '🦄', name: 'Unicorn',   msg: 'Unicorns are the most magical of all! ✨' },
        { emoji: '🐙', name: 'Octopus',   msg: 'Octopuses have EIGHT arms — so cool! 🌊' },
      ],
      foods: [
        { emoji: '🍕', name: 'Pizza',      msg: 'Pizza is SO yummy — best food ever! 🧀' },
        { emoji: '🍦', name: 'Ice Cream',  msg: 'Ice cream is the sweetest treat! 🍓' },
        { emoji: '🌮', name: 'Taco',       msg: 'Tacos are crunchy and delicious! 🌶️' },
        { emoji: '🍔', name: 'Burger',     msg: 'Burgers are big and SO tasty! 🥓' },
        { emoji: '🍩', name: 'Donut',      msg: 'Donuts are sweet, fluffy, and magical! 🍬' },
        { emoji: '🍪', name: 'Cookie',     msg: 'Cookies are warm and yummy! 🥛' },
        { emoji: '🍰', name: 'Cake',       msg: 'Cake means it\'s time to CELEBRATE! 🎉' },
        { emoji: '🥞', name: 'Pancakes',   msg: 'Pancakes with syrup are the best breakfast! 🍯' },
        { emoji: '🍓', name: 'Strawberry', msg: 'Strawberries are the prettiest AND yummiest! 💕' },
        { emoji: '🍭', name: 'Lollipop',   msg: 'Lollipops are sweet all the way through! 🌈' },
        { emoji: '🍟', name: 'Fries',      msg: 'French fries are crispy and SO good! 🧂' },
        { emoji: '🧁', name: 'Cupcake',    msg: 'Cupcakes are tiny little cakes of joy! 🌸' },
      ],
    };

    function buildGrid(type) {
      const grid = document.getElementById(`${type}-grid`);
      grid.innerHTML = '';
      DATA[type].forEach(item => {
        const card = document.createElement('div');
        card.className = 'pick-card';
        card.innerHTML = `<span class="pick-emoji">${item.emoji}</span><div class="pick-name">${item.name}</div>`;
        card.onclick = () => pick(type, item);
        grid.appendChild(card);
      });
    }

    function startGame(type) {
      gameCelebration();
      setTimeout(() => {
        document.getElementById('home').style.display = 'none';
        buildGrid(type);
        document.getElementById(`${type}-screen`).classList.add('show');
      }, 900);
    }

    function gameCelebration() {
      // Big 2566 number
      const num = document.createElement('div');
      num.className = 'number-burst';
      num.textContent = '2566';
      document.body.appendChild(num);
      setTimeout(() => num.remove(), 1400);

      // Floating stars and smileys
      const floaters = ['⭐','🌟','💫','✨','😊','😄','🎉','⭐','🌟','😊','💫','⭐'];
      floaters.forEach((icon, i) => {
        const el = document.createElement('div');
        el.className = 'float-piece';
        el.textContent = icon;
        el.style.cssText = `
          left: ${10 + Math.random()*80}%;
          bottom: ${10 + Math.random()*30}%;
          font-size: ${1.5 + Math.random()*2}rem;
          animation-duration: ${1 + Math.random()*1.2}s;
          animation-delay: ${i * 0.06}s;
        `;
        document.body.appendChild(el);
        setTimeout(() => el.remove(), 2500);
      });

      // Confetti burst
      const colors = ['#ff6fb7','#a259ff','#4fc3f7','#ffe066','#43e97b','#ff9f43'];
      for (let i = 0; i < 70; i++) {
        const c = document.createElement('div');
        c.className = 'confetti-piece';
        const size = 8 + Math.random() * 10;
        c.style.cssText = `
          left:${Math.random()*100}vw;
          top: -10px;
          width:${size}px; height:${size}px;
          background:${colors[Math.floor(Math.random()*colors.length)]};
          border-radius:${Math.random() > 0.5 ? '50%' : '2px'};
          animation-duration:${1.2 + Math.random()*1.5}s;
          animation-delay:${Math.random()*0.4}s;
        `;
        document.body.appendChild(c);
        setTimeout(() => c.remove(), 3000);
      }
    }

    function goHome() {
      document.querySelectorAll('.game-screen').forEach(s => s.classList.remove('show'));
      document.querySelectorAll('.result').forEach(r => r.classList.remove('show'));
      document.querySelectorAll('.grid').forEach(g => { g.style.display = ''; });
      document.getElementById('home').style.display = '';
    }

    function pick(type, item) {
      document.getElementById(`${type}-grid`).style.display = 'none';
      document.getElementById(`${type}-big`).textContent = item.emoji;
      document.getElementById(`${type}-title`).textContent = `You love ${item.name}!`;
      document.getElementById(`${type}-msg`).textContent = item.msg;
      document.getElementById(`${type}-result`).classList.add('show');
      launchConfetti();
    }

    function resetGame(type) {
      document.getElementById(`${type}-result`).classList.remove('show');
      document.getElementById(`${type}-grid`).style.display = '';
    }

    // ── MUSIC ──
    let audioCtx = null;
    let musicPlaying = false;
    let musicTimeout = null;

    // Hazel's Wiggle Song — made-up, 8-bit chiptune style! [freq Hz, beat-units]
    const SONG = [
      // Part 1 — boing boing boing!
      [523,0.25],[659,0.25],[784,0.5],
      [784,0.25],[659,0.25],[523,0.25],[659,0.25],
      [587,0.5],[523,0.75],[0,0.25],

      // Part 2 — wiggle wiggle!
      [880,0.25],[784,0.25],[880,0.25],[784,0.25],
      [659,0.25],[784,0.25],[659,0.5],
      [587,0.25],[523,0.75],[0,0.25],

      // Part 3 — zoom up HIGH!
      [523,0.25],[659,0.25],[784,0.25],[1047,0.5],
      [1047,0.25],[880,0.25],[784,0.5],
      [659,0.25],[587,0.25],[523,0.5],[0,0.25],

      // Part 4 — silly slide back down... ta-daaa!
      [784,0.25],[659,0.25],[587,0.25],[523,0.25],
      [659,0.25],[784,0.25],[880,0.5],
      [784,0.25],[659,0.25],[587,0.25],[523,1.0],
      [0,0.5],
    ];
    const BEAT = 0.26; // relaxed, not too fast

    function playNote(freq, startTime, dur) {
      if (freq === 0) return;
      const osc  = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.connect(gain);
      gain.connect(audioCtx.destination);
      osc.type = 'triangle'; // soft and warm
      osc.frequency.setValueAtTime(freq, startTime);
      gain.gain.setValueAtTime(0, startTime);
      gain.gain.linearRampToValueAtTime(0.14, startTime + 0.04);
      gain.gain.linearRampToValueAtTime(0, startTime + dur);
      osc.start(startTime);
      osc.stop(startTime + dur);
    }

    function playKick(startTime) {
      const osc  = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.connect(gain);
      gain.connect(audioCtx.destination);
      osc.type = 'sine';
      osc.frequency.setValueAtTime(120, startTime);
      osc.frequency.exponentialRampToValueAtTime(40, startTime + 0.18);
      gain.gain.setValueAtTime(0.18, startTime); // quiet kick
      gain.gain.exponentialRampToValueAtTime(0.001, startTime + 0.22);
      osc.start(startTime);
      osc.stop(startTime + 0.22);
    }

    function scheduleSong(startTime) {
      let t = startTime;
      const totalUnits = SONG.reduce((s, [,b]) => s + b, 0);

      SONG.forEach(([freq, beats]) => {
        playNote(freq, t, beats * BEAT * 0.85);
        t += beats * BEAT;
      });

      // just a gentle kick on beat 1 of every 4 — no hi-hats
      const ticks = Math.ceil(totalUnits);
      for (let i = 0; i < ticks; i++) {
        if (i % 4 === 0) playKick(startTime + i * BEAT);
      }

      return t;
    }

    function startMusicLoop() {
      if (!musicPlaying) return;
      const now = audioCtx.currentTime;
      const end = scheduleSong(now + 0.05);
      // schedule next loop slightly before this one ends
      const delay = (end - now - 0.1) * 1000;
      musicTimeout = setTimeout(startMusicLoop, Math.max(delay, 0));
    }

    function toggleMusic() {
      const btn = document.getElementById('music-btn');
      if (!musicPlaying) {
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        if (audioCtx.state === 'suspended') audioCtx.resume();
        musicPlaying = true;
        btn.textContent = '🔇';
        btn.classList.add('playing');
        startMusicLoop();
      } else {
        musicPlaying = false;
        clearTimeout(musicTimeout);
        btn.textContent = '🎵';
        btn.classList.remove('playing');
        // fade out by closing + recreating context next time
        audioCtx.suspend();
      }
    }

    function launchConfetti() {
      const colors = ['#ff6fb7','#a259ff','#4fc3f7','#ffe066','#43e97b','#ff9f43'];
      for (let i = 0; i < 60; i++) {
        const c = document.createElement('div');
        c.className = 'confetti-piece';
        const size = 8 + Math.random() * 10;
        c.style.cssText = `
          left:${Math.random()*100}vw;
          width:${size}px; height:${size}px;
          background:${colors[Math.floor(Math.random()*colors.length)]};
          border-radius:${Math.random() > 0.5 ? '50%' : '2px'};
          animation-duration:${1.5 + Math.random()*2}s;
          animation-delay:${Math.random()*0.6}s;
        `;
        document.body.appendChild(c);
        setTimeout(() => c.remove(), 3500);
      }
    }
  </script>

</body>
</html>
